name: Pipeline ETL automático

on:
  workflow_dispatch:    # solo manual, nunca automático

jobs:
  run_pipeline:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Crear carpetas necesarias
        run: mkdir -p data/raw data/processed logs

      - name: Ejecutar extracción y transformación
        run: |
          python src/extract.py
          python src/transform.py

      - name: Commitear datos procesados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/processed/coins_clean_*.parquet
          git commit -m "chore: actualizar datos procesados [$(date -u +%Y-%m-%dT%H:%MZ)]" \
            || echo "Sin cambios en los datos, nada que commitear"
          git push